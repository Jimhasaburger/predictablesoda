<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>home</title>
    
    <link rel="stylesheet" href="resources/header/header.css">
    <link rel="stylesheet" href="resources/topgames/styles.css">
    <link rel="stylesheet" href="resources/footer/styles.css">
    <link rel="stylesheet" href="styles.css">
    <style>body { visibility: hidden; }</style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <h1>why are you here</h1>
        <div id="topgames-placeholder"></div>
    </main>
    <div id="footer-placeholder"></div>
    <script>
        let loaded = 0;
        function fragmentLoaded() {
            if (++loaded === 3) document.body.style.visibility = 'visible';
        }

        function loadHTML(url, elementId, callback) {
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;
                    fragmentLoaded();
                    if (callback) callback();
                })
                .catch(error => console.error(`Error loading ${url}:`, error));
        }

        function setActiveNav() {
            const path = window.location.pathname.replace(/\/+$/, '') || '/';
            document.querySelectorAll('.header-nav a').forEach(a => {
                const href = a.getAttribute('href').replace(/\/+$/, '') || '/';
                a.classList.toggle('active', href === path);
            });
        }

        loadHTML('resources/header/header.html', 'header-placeholder', setActiveNav);
        loadHTML('resources/footer/footer.html', 'footer-placeholder');
        loadHTML('resources/topgames/topgames.html', 'topgames-placeholder', () => {
            const script = document.createElement('script');
            script.src = 'resources/topgames/topgames.js';
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
